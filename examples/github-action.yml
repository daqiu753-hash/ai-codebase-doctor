name: AI Codebase Doctor

on:
  pull_request:
  push:
    branches: [main]

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Use --online only if your CI is allowed to reach the npm registry.
      - run: npx ai-codebase-doctor . --ci
